name: jobmcp

services:
  valkey:
    image: valkey/valkey:9.0.3-alpine3.23
    command: ["valkey-server", "--appendonly", "yes", "--appendfsync", "everysec", "--save", "60", "1"]
    volumes:
      - valkey-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  jobmcp:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      JOBMCP_HOST: 0.0.0.0
      JOBMCP_PORT: 8000
      JOBMCP_MCP_PATH: /mcp
      JOBMCP_STATELESS_HTTP: "true"
      JOBMCP_VALKEY_URL: redis://valkey:6379/0
      JOBMCP_VALKEY_PREFIX: jobmcp
      JOBMCP_SEED_ON_STARTUP: "true"
    depends_on:
      valkey:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  valkey-data:
