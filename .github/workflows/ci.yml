name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "codex/**"]

permissions:
  contents: read

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest
